server:
  port: 8080

spring:
  application:
    name: jingqu-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/jingqu_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: root
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      encoding: UTF-8
      continue-on-error: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.jingqu.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  sql-parser-cache:
    enabled: false

# JWT配置
jwt:
  # HS512 requires at least 64 bytes; keep this secret sufficiently long
  secret: jingquSecretKey2026ForDigitalPersonSystemPleaseUseAProperlyLongSecretKeyHere
  expiration: 86400000

# WebSocket配置
websocket:
  heartbeat-interval: 30000
  max-connections: 10000

ai:
  enable-rag: ${AI_ENABLE_RAG:true}
  enable-fallback: ${AI_ENABLE_FALLBACK:true}
  timeout-ms: ${AI_TIMEOUT_MS:15000}
  ragflow:
    base-url: ${RAGFLOW_BASE_URL:http://localhost:9390}
    api-key: ${RAGFLOW_API_KEY:}
    dataset:
      spot-structured: ${RAGFLOW_DATASET_SPOT_STRUCTURED:scenic-spot-structured}
      history-route: ${RAGFLOW_DATASET_HISTORY_ROUTE:history-culture-route}
    chat:
      spot-structured-id: ${RAGFLOW_CHAT_SPOT_STRUCTURED_ID:}
      history-route-id: ${RAGFLOW_CHAT_HISTORY_ROUTE_ID:}
  deepseek:
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    api-key: ${DEEPSEEK_API_KEY:}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
